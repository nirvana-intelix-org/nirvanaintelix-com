<!doctype html>
<html><head><style>
  html, body { margin: 0; padding: 0; width: 180px; height: 180px; }
  body { background: transparent; }
  .icon {
    width: 180px; height: 180px;
    background: #15161a;
    border-radius: 40px;
    display: grid;
    place-items: center;
    font-family: ui-serif, 'Instrument Serif', Georgia, serif;
    color: #f6f1e7;
    font-style: italic;
    font-size: 90px;
    position: relative;
    line-height: 1;
  }
  .dot {
    position: absolute;
    top: 26px; right: 26px;
    width: 14px; height: 14px;
    border-radius: 50%;
    background: #bd5a1a;
  }
</style></head>
<body>
  <div class="icon">
    NI
    <span class="dot"></span>
  </div>
</body></html>
